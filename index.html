<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epistolario de Don Pedro de Santacilia y Pax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#c5a028",
                        secondary: "#2d2a26",
                        background: { light: "#fcfbf8", surface: "#f3f0e7" },
                        text: { main: "#1b180d", muted: "#5a5545" }
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        serif: ["Merriweather", "serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfbf8; color: #1b180d; }
        .font-serif { font-family: 'Merriweather', serif; }
        /* View sections handled by Tailwind hidden/flex classes */
        #map-container, #timeline-map-container { background-color: #eaddcf; z-index: 1; }
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
          filter: grayscale(100%) sepia(20%) contrast(1.1) opacity(0.8);
        }
        /* Arc animations */
        .leaflet-interactive.arc-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 3s linear forwards;
        }
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
        .moving-letter-label {
            pointer-events: none;
        }
        .static-sender-label, .static-recipient-label {
            pointer-events: none;
        }
        .moving-letter-content {
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
        }
        .custom-slider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2d2a26;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-top: -9px;
        }
        .custom-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2d2a26;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .custom-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: transparent;
        }
        .static-label-content {
            transform: translate(-50%, -100%);
            margin-top: -16px;
            width: max-content;
        }
        
        /* Push Leaflet zoom controls down to avoid overlapping with custom overlays */
        #view-dashboard .leaflet-top.leaflet-left {
            margin-top: 80px;
        }
        #view-timeline .leaflet-top.leaflet-left {
            margin-top: 200px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Top Navigation -->
    <header class="flex items-center justify-between border-b border-[#e7e1cf] bg-[#fcfbf8] px-6 py-3 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-primary text-3xl">history_edu</span>
            <div>
                <h1 class="font-bold text-lg leading-tight">Epistolario de Don Pedro</h1>
                <p class="text-xs text-text-muted">Legajo 10 (1668-1669)</p>
            </div>
        </div>
        <nav class="flex items-center gap-6">
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-btn font-bold text-primary border-b-2 border-primary pb-1">Dashboard</button>
            <button onclick="switchView('timeline')" id="nav-timeline" class="nav-btn text-text-muted hover:text-primary pb-1">Línea de Tiempo</button>
            <div class="h-6 w-px bg-[#e7e1cf] mx-2"></div>
            <label for="folder-upload" class="cursor-pointer flex items-center gap-2 bg-[#f3f0e7] hover:bg-[#e7e1cf] px-3 py-1.5 rounded-lg text-sm font-medium text-secondary transition">
                <span class="material-symbols-outlined text-[18px]">folder_open</span>
                Importar Carpeta
            </label>
            <input type="file" id="folder-upload" webkitdirectory directory multiple class="hidden" onchange="handleFileUpload(event)">
        </nav>
    </header>

    <!-- VIEWS -->
    <main class="flex-1 relative overflow-hidden flex">
        
        <!-- 1. DASHBOARD VIEW -->
        <section id="view-dashboard" class="w-full h-full flex flex-col">
            <!-- Map Area (Top) -->
            <div class="w-full h-[45vh] relative shrink-0 border-b border-[#e7e1cf] z-0">
                <div id="map-container" class="w-full h-full bg-[#eaddcf]"></div>
                <!-- Overlay Stats -->
                <div class="absolute top-4 left-4 z-[400] bg-white/90 backdrop-blur p-3 rounded-xl shadow-sm border border-[#e7e1cf] flex gap-6 pointer-events-auto">
                    <div class="text-center">
                        <p class="text-[10px] uppercase tracking-wider text-text-muted font-bold mb-0.5">Cartas</p>
                        <p id="stat-cartas" class="text-xl font-serif font-bold text-primary leading-none">0</p>
                    </div>
                    <div class="text-center border-l border-[#e7e1cf] pl-6">
                        <p class="text-[10px] uppercase tracking-wider text-text-muted font-bold mb-0.5">Lugares</p>
                        <p id="stat-nodos" class="text-xl font-serif font-bold text-primary leading-none">0</p>
                    </div>
                </div>
            </div>

            <!-- Filters Section (Middle) -->
            <div class="bg-white border-b border-[#e7e1cf] p-3 shrink-0 z-10 shadow-sm">
                <div class="flex flex-wrap gap-3 items-center text-sm max-w-[1600px] mx-auto w-full">
                    <div class="flex items-center gap-2 bg-[#fcfbf8] border border-[#e7e1cf] rounded-lg px-3 py-1.5 flex-1 min-w-[200px]">
                        <span class="material-symbols-outlined text-text-muted text-[18px]">search</span>
                        <input type="text" id="filter-text" placeholder="Buscar en texto o nombres..." class="bg-transparent border-none outline-none w-full text-secondary placeholder:text-text-muted">
                    </div>
                    <select id="filter-remitente" class="bg-[#fcfbf8] border border-[#e7e1cf] rounded-lg px-3 py-1.5 text-secondary outline-none focus:border-primary"><option value="">Remitente (Todos)</option></select>
                    <select id="filter-destinatario" class="bg-[#fcfbf8] border border-[#e7e1cf] rounded-lg px-3 py-1.5 text-secondary outline-none focus:border-primary"><option value="">Destinatario (Todos)</option></select>
                    <select id="filter-origen" class="bg-[#fcfbf8] border border-[#e7e1cf] rounded-lg px-3 py-1.5 text-secondary outline-none focus:border-primary"><option value="">Origen (Todos)</option></select>
                    <select id="filter-dest" class="bg-[#fcfbf8] border border-[#e7e1cf] rounded-lg px-3 py-1.5 text-secondary outline-none focus:border-primary"><option value="">Destino (Todos)</option></select>
                    <select id="filter-idioma" class="bg-[#fcfbf8] border border-[#e7e1cf] rounded-lg px-3 py-1.5 text-secondary outline-none focus:border-primary"><option value="">Idioma (Todos)</option></select>
                </div>
            </div>

            <!-- List Section (Bottom) -->
            <div class="flex-1 overflow-y-auto bg-[#fcfbf8] p-4">
                <div id="letter-list" class="max-w-[1600px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- Letters injected here -->
                </div>
            </div>
        </section>

        <!-- 2. TIMELINE VIEW -->
        <section id="view-timeline" class="w-full h-full hidden flex-col relative">
            <div id="timeline-map-container" class="w-full h-full absolute inset-0"></div>
            
            <!-- Summary Overlay (Top Left) -->
            <div id="timeline-summary-overlay" class="absolute top-4 left-4 z-[400] bg-white/95 backdrop-blur rounded-xl shadow-lg border border-[#e7e1cf] p-4 max-w-md w-full opacity-0 pointer-events-none transition-opacity duration-300">
                <div id="timeline-summary-content" class="text-sm"></div>
            </div>

            <!-- Timeline Feed (Crónica) -->
            <div class="absolute top-4 right-4 w-80 bg-white/95 backdrop-blur rounded-xl shadow-lg border border-[#e7e1cf] flex flex-col max-h-[calc(100%-180px)] z-[400] overflow-hidden pointer-events-auto">
                <div class="p-4 border-b border-[#e7e1cf] bg-[#fcfbf8] shrink-0">
                    <h3 class="font-serif font-bold text-primary flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">history_edu</span>
                        Crónica de Envíos
                    </h3>
                </div>
                <div id="timeline-feed-content" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm">
                    <p class="text-text-muted italic text-xs text-center">Inicia la línea de tiempo para ver los eventos.</p>
                </div>
            </div>

            <!-- Timeline Controls -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-11/12 max-w-4xl bg-white/95 backdrop-blur rounded-xl shadow-lg border border-[#e7e1cf] p-6 z-[400] overflow-hidden">
                <!-- Progress Bar -->
                <div class="absolute top-0 left-0 right-0 h-1 bg-[#e7e1cf]">
                    <div id="playback-progress-bar" class="h-full bg-primary w-0 transition-none"></div>
                </div>
                
                <div class="flex items-center gap-6 mt-1">
                    <div class="flex flex-col items-center gap-2 shrink-0">
                        <div class="flex items-center gap-2">
                            <button onclick="jumpToPrevEvent()" class="flex items-center justify-center size-8 rounded-full bg-[#f3f0e7] text-text-muted hover:bg-[#e7e1cf] hover:text-primary transition-all" title="Evento anterior">
                                <span class="material-symbols-outlined text-[20px]">skip_previous</span>
                            </button>
                            <button onclick="togglePlay()" class="flex items-center justify-center size-12 rounded-full bg-primary text-white hover:bg-[#a38420] shadow-md transition-all">
                                <span id="play-btn-icon" class="material-symbols-outlined text-[28px] ml-1">play_arrow</span>
                            </button>
                            <button onclick="jumpToNextEvent()" class="flex items-center justify-center size-8 rounded-full bg-[#f3f0e7] text-text-muted hover:bg-[#e7e1cf] hover:text-primary transition-all" title="Siguiente evento">
                                <span class="material-symbols-outlined text-[20px]">skip_next</span>
                            </button>
                        </div>
                        <select id="playback-speed" class="bg-[#f3f0e7] border border-[#e7e1cf] text-text-muted text-[10px] font-bold uppercase rounded px-1 py-0.5 outline-none cursor-pointer" title="Tiempo de espera entre eventos">
                            <option value="3000">Lento</option>
                            <option value="1500" selected>Normal</option>
                            <option value="500">Rápido</option>
                        </select>
                    </div>
                    <div class="flex-1 flex flex-col justify-center">
                        <div class="flex justify-between items-end mb-2 px-1">
                            <span class="text-xs font-bold text-text-muted">Enero 1668</span>
                            <span id="current-month-display" class="text-xl font-bold text-primary">Enero 1668</span>
                            <span class="text-xs font-bold text-text-muted">Diciembre 1669</span>
                        </div>
                        <div class="relative w-full py-3 flex items-center">
                            <div class="absolute left-0 right-0 h-2 bg-[#e7e1cf] rounded-lg z-0"></div>
                            <div id="timeline-markers" class="absolute left-0 right-0 h-0 z-10"></div>
                            <input type="range" id="timeline-slider" min="0" max="23" value="0" class="w-full h-2 bg-transparent appearance-none cursor-pointer relative z-20 custom-slider">
                        </div>
                        <div class="flex justify-between mt-1 text-xs text-text-muted px-1">
                            <span>1668</span>
                            <span>1669</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. READER VIEW -->
        <section id="view-reader" class="w-full h-full hidden flex-col md:flex-row bg-[#fcfbf8] absolute inset-0 z-[500]">
            <!-- Header for Reader -->
            <div class="absolute top-0 left-0 right-0 h-14 bg-white border-b border-[#e7e1cf] flex items-center justify-between px-4 z-10 shadow-sm">
                <button onclick="closeReader()" class="flex items-center gap-2 text-text-muted hover:text-primary transition">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span class="font-medium">Volver al Legajo</span>
                </button>
                <div class="flex items-center gap-3 bg-[#f3f0e7] p-1 rounded-lg">
                    <button id="btn-literal" onclick="toggleTranscription('literal')" class="px-3 py-1 text-sm font-medium rounded text-text-muted hover:text-primary">Literal</button>
                    <button id="btn-modern" onclick="toggleTranscription('modern')" class="px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-primary">Modernizada</button>
                </div>
            </div>

            <!-- Left: Manuscript -->
            <div class="w-full md:w-1/2 h-full pt-14 border-r border-[#e7e1cf] bg-[#2d2a26] relative overflow-hidden group">
                <div class="w-full h-full flex items-center justify-center p-8 overflow-auto">
                    <!-- Placeholder for manuscript image -->
                    <img src="https://images.unsplash.com/photo-1577083552431-6e5fd01aa342?q=80&w=1000&auto=format&fit=crop" alt="Manuscrito" class="max-w-full max-h-full object-contain shadow-2xl transition-transform duration-300" id="manuscript-img">
                </div>
                <!-- Zoom Controls -->
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-white/10 backdrop-blur p-2 rounded-full border border-white/20 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="zoomManuscript(-0.2)" class="text-white hover:text-primary p-1 rounded-full hover:bg-white/20"><span class="material-symbols-outlined">remove</span></button>
                    <button onclick="zoomManuscript(0.2)" class="text-white hover:text-primary p-1 rounded-full hover:bg-white/20"><span class="material-symbols-outlined">add</span></button>
                </div>
            </div>

            <!-- Right: Transcription -->
            <div class="w-full md:w-1/2 h-full overflow-y-auto bg-[#fcfbf8] px-8 pb-8 pt-24 md:px-12 md:pb-12 md:pt-28">
                <div class="max-w-2xl mx-auto">
                    <div class="mb-8 border-b border-[#e7e1cf] pb-6">
                        <h2 id="reader-title" class="text-3xl font-bold mb-4 text-secondary">Carta</h2>
                        <div class="flex flex-wrap gap-4 text-sm text-text-muted">
                            <span id="reader-date" class="flex items-center gap-1 bg-[#f3f0e7] px-3 py-1 rounded-full"><span class="material-symbols-outlined text-[16px]">calendar_today</span> ...</span>
                            <span id="reader-route" class="flex items-center gap-1 bg-[#f3f0e7] px-3 py-1 rounded-full"><span class="material-symbols-outlined text-[16px]">route</span> ...</span>
                        </div>
                    </div>
                    <div id="reader-content" class="font-serif text-lg leading-relaxed text-[#2d2a26]">
                        <!-- Content injected here -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // MOCK DATA
        let filteredLetters = [];
        let letters = [
            {
                id: 1,
                remitente: "Pedro de Santacilia",
                destinatario: "Marqués de los Vélez",
                fecha: "1668-02-15",
                origen: { nombre: "Palma", lat: 39.5696, lng: 2.6502 },
                destino: { nombre: "Madrid", lat: 40.4168, lng: -3.7038 },
                texto_literal: "Señor mio: Habiendo llegado a esta Corte el dia de ayer, no he querido dilatar el dar cuenta a V.E. de mi arribo, y de la buena falud con que Dios me ha favorecido en el viaje. Luego que descansé un poco, pasé a visitar al Señor Presidente del Consejo...",
                texto_modernizado: "Señor mío: Habiendo llegado a esta Corte el día de ayer, no he querido dilatar el dar cuenta a Vuestra Excelencia de mi arribo, y de la buena salud con que Dios me ha favorecido en el viaje. Luego que descansé un poco, pasé a visitar al Señor Presidente del Consejo..."
            },
            {
                id: 2,
                remitente: "Miguel Malo",
                destinatario: "Pedro de Santacilia",
                fecha: "1668-05-10",
                origen: { nombre: "Valencia", lat: 39.4699, lng: -0.3763 },
                destino: { nombre: "Palma", lat: 39.5696, lng: 2.6502 },
                texto_literal: "Mui señor mio y mi dueño: Recivi la de V.m. con el gusto q. siempre, celebro su buena salud. Por aca las cosas de la armada andan con la lentitud ordinaria. Remito los pliegos que me encomendó...",
                texto_modernizado: "Muy señor mío y mi dueño: Recibí la de Vuestra Merced con el gusto que siempre, celebro su buena salud. Por acá las cosas de la armada andan con la lentitud ordinaria. Remito los pliegos que me encomendó..."
            },
            {
                id: 3,
                remitente: "Duque de Gandía",
                destinatario: "Pedro de Santacilia",
                fecha: "1668-08-22",
                origen: { nombre: "Madrid", lat: 40.4168, lng: -3.7038 },
                destino: { nombre: "Palma", lat: 39.5696, lng: 2.6502 },
                texto_literal: "Amigo y señor: El despacho de los negocios de esa isla se ha retardado por las ocupaciones del Consejo. Procurare avivar el expediente en la primera ocasion que tenga de hablar con Su Majestad...",
                texto_modernizado: "Amigo y señor: El despacho de los negocios de esa isla se ha retardado por las ocupaciones del Consejo. Procuraré avivar el expediente en la primera ocasión que tenga de hablar con Su Majestad..."
            },
            {
                id: 4,
                remitente: "Pedro de Santacilia",
                destinatario: "Virrey de Cerdeña",
                fecha: "1669-03-05",
                origen: { nombre: "Palma", lat: 39.5696, lng: 2.6502 },
                destino: { nombre: "Cagliari", lat: 39.2238, lng: 9.1116 },
                texto_literal: "Exmo. Señor: Los navios q. partieron de este puerto llevan los bastimentos acordados. Espero q. lleguen con bien a esa ciudad para socorro de las tropas que allí se hallan...",
                texto_modernizado: "Excelentísimo Señor: Los navíos que partieron de este puerto llevan los bastimentos acordados. Espero que lleguen con bien a esa ciudad para socorro de las tropas que allí se hallan..."
            },
            {
                id: 5,
                remitente: "Jerónimo Pelegrín",
                destinatario: "Pedro de Santacilia",
                fecha: "1669-11-18",
                origen: { nombre: "Zaragoza", lat: 41.6488, lng: -0.8891 },
                destino: { nombre: "Palma", lat: 39.5696, lng: 2.6502 },
                texto_literal: "Hermano mio: Remito con el portador las escrituras tocantes al censo de la hacienda. Quedamos todos con salud, a Dios gracias, y deseosos de verle pronto por estas tierras...",
                texto_modernizado: "Hermano mío: Remito con el portador las escrituras tocantes al censo de la hacienda. Quedamos todos con salud, a Dios gracias, y deseosos de verle pronto por estas tierras..."
            }
        ];

        let currentLetter = null;
        let currentTranscription = 'modern';
        let mapDashboard, mapTimeline;
        let dashboardArcs = [];
        let timelineArcs = [];
        let currentZoom = 1;
        let imageMap = {}; // Maps filename to object URL

        function normalizeLetter(data) {
            const locationCoords = {
                "Valencia": { lat: 39.4699, lng: -0.3763 },
                "Palma": { lat: 39.5696, lng: 2.6502 },
                "Madrid": { lat: 40.4168, lng: -3.7038 },
                "Zaragoza": { lat: 41.6488, lng: -0.8891 },
                "Cagliari": { lat: 39.2238, lng: 9.1116 },
                "Huesca": { lat: 42.1362, lng: -0.4087 },
                "Barcelona": { lat: 41.3851, lng: 2.1734 }
            };

            let origenName = data.lugar || (data.origen ? data.origen.nombre : "Desconocido");
            let origenCoords = data.origen ? { lat: data.origen.lat, lng: data.origen.lng } : (locationCoords[origenName] || { lat: 39.5696, lng: 2.6502 });
            
            let destinoName = data.destino ? data.destino.nombre : "Palma";
            if (!data.destino) {
                if (data.remitente && data.remitente.includes("Santacilia")) destinoName = "Madrid";
                if (data.destinatario && data.destinatario.includes("Pelegrín")) destinoName = "Zaragoza";
            }
            let destinoCoords = data.destino ? { lat: data.destino.lat, lng: data.destino.lng } : (locationCoords[destinoName] || { lat: 39.5696, lng: 2.6502 });

            let parsedDate = new Date(1668, 0, 1);
            if (data.fecha) {
                if (data.fecha.match(/^\d{4}-\d{2}-\d{2}$/)) {
                    parsedDate = new Date(data.fecha);
                } else {
                    const months = { "enero": 0, "febrero": 1, "marzo": 2, "abril": 3, "mayo": 4, "junio": 5, "julio": 6, "agosto": 7, "septiembre": 8, "octubre": 9, "noviembre": 10, "diciembre": 11 };
                    const parts = data.fecha.toLowerCase().split(' de ');
                    if (parts.length === 3) {
                        parsedDate = new Date(parseInt(parts[2]), months[parts[1].trim()], parseInt(parts[0]));
                    }
                }
            }

            return {
                id: data.id_carta || data.id || Math.random().toString(36).substr(2, 9),
                nombre_carta: data.nombre_carta || null,
                remitente: data.remitente || "Desconocido",
                destinatario: data.destinatario || "Desconocido",
                fecha: data.fecha || "Sin fecha",
                parsedDate: parsedDate,
                origen: { nombre: origenName, lat: origenCoords.lat, lng: origenCoords.lng },
                destino: { nombre: destinoName, lat: destinoCoords.lat, lng: destinoCoords.lng },
                texto_literal: data.transcripcion ? data.transcripcion.literal : (data.texto_literal || ""),
                texto_modernizado: data.transcripcion ? data.transcripcion.modernizada : (data.texto_modernizado || ""),
                imagenes: data.imagenes || (data.imagen ? [data.imagen] : [])
            };
        }

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            letters = letters.map(normalizeLetter);
            filteredLetters = [...letters];
            initDashboard();
            initTimeline();
            updateFilters();
            applyFilters();
        });

        function updateStats() {
            const uniqueNodes = new Set();
            const dataToUse = filteredLetters.length > 0 || document.getElementById('filter-text')?.value ? filteredLetters : letters;
            dataToUse.forEach(l => {
                if(l.origen && l.origen.nombre) uniqueNodes.add(l.origen.nombre);
                if(l.destino && l.destino.nombre) uniqueNodes.add(l.destino.nombre);
            });
            document.getElementById('stat-cartas').innerText = dataToUse.length;
            document.getElementById('stat-nodos').innerText = uniqueNodes.size;
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const jsonFiles = [];
            const imgFiles = [];

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.name.endsWith('.json')) {
                    jsonFiles.push(file);
                } else if (file.type.startsWith('image/')) {
                    imgFiles.push(file);
                }
            }

            // Create object URLs for images
            imageMap = {};
            imgFiles.forEach(file => {
                const url = URL.createObjectURL(file);
                imageMap[file.name] = url;
                if (file.webkitRelativePath) {
                    imageMap[file.webkitRelativePath] = url;
                }
            });

            // Read JSONs
            const newLetters = [];
            for (let file of jsonFiles) {
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (Array.isArray(data)) {
                        newLetters.push(...data.map(normalizeLetter));
                    } else {
                        newLetters.push(normalizeLetter(data));
                    }
                } catch (e) {
                    console.error("Error parsing JSON:", file.name, e);
                }
            }

            if (newLetters.length > 0) {
                // Sort by date
                newLetters.sort((a, b) => a.parsedDate - b.parsedDate);
                
                letters = newLetters;
                filteredLetters = [...letters];
                
                // Re-render UI
                updateFilters();
                applyFilters();
                
                renderTimelineMarkers();
                updateTimeline(document.getElementById('timeline-slider').value);
                
                alert(`Se han importado ${letters.length} cartas y ${imgFiles.length} imágenes correctamente.`);
            } else {
                alert("No se encontraron archivos JSON válidos en la carpeta.");
            }
        }

        // Helper to draw curved lines (quadratic bezier)
        function getCurvePoints(latlng1, latlng2, offsetMultiplier = 1) {
            const offsetX = latlng2[1] - latlng1[1];
            const offsetY = latlng2[0] - latlng1[0];
            const r = Math.sqrt(Math.pow(offsetX, 2) + Math.pow(offsetY, 2));
            const theta = Math.atan2(offsetY, offsetX);
            const thetaOffset = (3.14 / 10) * offsetMultiplier;
            const r2 = (r / 2) / Math.cos(thetaOffset);
            const centerLat = latlng1[0] + r2 * Math.sin(theta + thetaOffset);
            const centerLng = latlng1[1] + r2 * Math.cos(theta + thetaOffset);
            
            const points = [];
            for (let i = 0; i <= 20; i++) {
                const t = i / 20;
                const lat = Math.pow(1 - t, 2) * latlng1[0] + 2 * (1 - t) * t * centerLat + Math.pow(t, 2) * latlng2[0];
                const lng = Math.pow(1 - t, 2) * latlng1[1] + 2 * (1 - t) * t * centerLng + Math.pow(t, 2) * latlng2[1];
                points.push([lat, lng]);
            }
            return points;
        }

        let dashboardLayers = {};

        function drawArcs(mapInstance, data, arcArray) {
            // Clear existing
            arcArray.forEach(layer => mapInstance.removeLayer(layer));
            arcArray.length = 0;
            dashboardLayers = {};

            // Group by route
            const routes = {};
            data.forEach((letter) => {
                if (!letter.origen || !letter.destino) return;
                const routeKey = `${letter.origen.nombre}|${letter.destino.nombre}`;
                if (!routes[routeKey]) {
                    routes[routeKey] = {
                        origen: letter.origen,
                        destino: letter.destino,
                        letters: [],
                        count: 0
                    };
                }
                routes[routeKey].letters.push(letter);
                routes[routeKey].count++;
            });

            let colorIndex = 0;
            const colors = ['#c5a028', '#4a6741', '#8b5a2b', '#2d6a4f', '#9c6644', '#6b705c'];

            Object.values(routes).forEach(route => {
                const p1 = [route.origen.lat, route.origen.lng];
                const p2 = [route.destino.lat, route.destino.lng];
                
                const curvePoints = getCurvePoints(p1, p2, 1);
                const color = colors[colorIndex % colors.length];
                colorIndex++;

                // Base weight depends on count (e.g., 2 + count * 0.5, max 10)
                const baseWeight = Math.min(10, 2 + route.count * 0.5);

                const line = L.polyline(curvePoints, {
                    color: color,
                    weight: baseWeight,
                    opacity: 0.6,
                    className: 'arc-path cursor-pointer transition-all duration-300'
                }).addTo(mapInstance);
                
                const midPoint = curvePoints[Math.floor(curvePoints.length / 2)];
                const labelText = route.count > 1 ? `${route.count} cartas` : route.letters[0].fecha;
                const labelIcon = L.divIcon({
                    className: 'dashboard-route-label',
                    html: `<div class="static-label-content bg-[#fcfbf8] text-[#2d2a26] px-3 py-1.5 rounded-lg shadow-lg border whitespace-nowrap w-max pointer-events-none opacity-0 transition-opacity duration-300" style="border-color: ${color}" id="label-route-${route.origen.nombre}-${route.destino.nombre}">
                            <span class="text-[9px] uppercase tracking-wider text-text-muted block mb-0.5">${labelText}</span>
                            <span class="font-serif font-bold text-sm" style="color: ${color}">${route.origen.nombre} &rarr; ${route.destino.nombre}</span>
                           </div>`,
                    iconSize: [0, 0]
                });
                const labelMarker = L.marker(midPoint, { icon: labelIcon, zIndexOffset: 1000 }).addTo(mapInstance);

                const originMarker = L.circleMarker(p1, {
                    radius: 5 + Math.min(5, route.count * 0.5), fillColor: '#2d2a26', color: '#fff', weight: 2, fillOpacity: 1, className: 'cursor-pointer transition-all duration-300'
                }).addTo(mapInstance);
                
                const destMarker = L.circleMarker(p2, {
                    radius: 5 + Math.min(5, route.count * 0.5), fillColor: color, color: '#fff', weight: 2, fillOpacity: 1, className: 'cursor-pointer transition-all duration-300'
                }).addTo(mapInstance);
                
                route.letters.forEach(letter => {
                    dashboardLayers[letter.id] = { 
                        line, originMarker, destMarker, labelMarker, color, routeKey: `${route.origen.nombre}-${route.destino.nombre}`, baseWeight
                    };
                });
                
                arcArray.push(line, originMarker, destMarker, labelMarker);

                const handleMouseOver = () => {
                    route.letters.forEach(l => highlightListElement(l.id));
                    
                    line.setStyle({ weight: baseWeight + 3, opacity: 1 });
                    line.bringToFront();
                    originMarker.setStyle({ radius: 8 + Math.min(5, route.count * 0.5), opacity: 1, fillOpacity: 1 });
                    originMarker.bringToFront();
                    destMarker.setStyle({ radius: 8 + Math.min(5, route.count * 0.5), opacity: 1, fillOpacity: 1 });
                    destMarker.bringToFront();
                    
                    const labelEl = document.getElementById(`label-route-${route.origen.nombre}-${route.destino.nombre}`);
                    if (labelEl) labelEl.classList.remove('opacity-0');
                };
                
                const handleMouseOut = () => {
                    resetListHighlight();
                    resetMapHighlight();
                };

                line.on('mouseover', handleMouseOver);
                line.on('mouseout', handleMouseOut);
                originMarker.on('mouseover', handleMouseOver);
                originMarker.on('mouseout', handleMouseOut);
                destMarker.on('mouseover', handleMouseOver);
                destMarker.on('mouseout', handleMouseOut);
            });
        }

        function highlightMapElement(letterId) {
            const targetLayer = dashboardLayers[letterId];
            if (!targetLayer) return;

            Object.values(dashboardLayers).forEach(layers => {
                const labelEl = document.getElementById(`label-route-${layers.routeKey}`);
                
                if (layers.routeKey === targetLayer.routeKey) {
                    layers.line.setStyle({ weight: layers.baseWeight + 3, opacity: 1 });

                    layers.originMarker.setStyle({ radius: 8, opacity: 1, fillOpacity: 1 });
                    layers.originMarker.bringToFront();

                    layers.destMarker.bringToFront();
                    
                    if (labelEl) labelEl.classList.remove('opacity-0');
                } else {
                    layers.line.setStyle({ weight: layers.baseWeight, opacity: 0.15 });
                    layers.originMarker.setStyle({ opacity: 0.15, fillOpacity: 0.15 });
                    layers.destMarker.setStyle({ opacity: 0.15, fillOpacity: 0.15 });
                    
                    if (labelEl) labelEl.classList.add('opacity-0');
                }
            });
        }

        function updateFilters() {
            const remitentes = new Set();
            const destinatarios = new Set();
            const origenes = new Set();
            const destinos = new Set();
            const idiomas = new Set();

            letters.forEach(l => {
                if (l.remitente) remitentes.add(l.remitente);
                if (l.destinatario) destinatarios.add(l.destinatario);
                if (l.origen && l.origen.nombre) origenes.add(l.origen.nombre);
                if (l.destino && l.destino.nombre) destinos.add(l.destino.nombre);
                if (l.idioma) idiomas.add(l.idioma);
            });

            const populate = (id, set, defaultText) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.innerHTML = `<option value="">${defaultText}</option>`;
                Array.from(set).sort().forEach(val => {
                    el.innerHTML += `<option value="${val}">${val}</option>`;
                });
                el.addEventListener('change', applyFilters);
            };

            populate('filter-remitente', remitentes, 'Remitente (Todos)');
            populate('filter-destinatario', destinatarios, 'Destinatario (Todos)');
            populate('filter-origen', origenes, 'Origen (Todos)');
            populate('filter-dest', destinos, 'Destino (Todos)');
            populate('filter-idioma', idiomas, 'Idioma (Todos)');
            
            const textFilter = document.getElementById('filter-text');
            if (textFilter) {
                textFilter.addEventListener('input', applyFilters);
            }
        }

        function applyFilters() {
            const text = document.getElementById('filter-text')?.value.toLowerCase() || '';
            const rem = document.getElementById('filter-remitente')?.value || '';
            const dest = document.getElementById('filter-destinatario')?.value || '';
            const ori = document.getElementById('filter-origen')?.value || '';
            const des = document.getElementById('filter-dest')?.value || '';
            const idi = document.getElementById('filter-idioma')?.value || '';

            filteredLetters = letters.filter(l => {
                let match = true;
                if (rem && l.remitente !== rem) match = false;
                if (dest && l.destinatario !== dest) match = false;
                if (ori && (!l.origen || l.origen.nombre !== ori)) match = false;
                if (des && (!l.destino || l.destino.nombre !== des)) match = false;
                if (idi && l.idioma !== idi) match = false;
                
                if (text) {
                    const searchable = `${l.remitente} ${l.destinatario} ${l.origen?.nombre} ${l.destino?.nombre} ${l.texto_literal} ${l.texto_modernizado}`.toLowerCase();
                    if (!searchable.includes(text)) match = false;
                }
                return match;
            });

            renderLetterList(filteredLetters);
            drawArcs(mapDashboard, filteredLetters, dashboardArcs);
            updateStats();
        }

        function updateTimeline(monthIndex) {
            const year = 1668 + Math.floor(monthIndex / 12);
            const month = (monthIndex % 12) + 1;
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            
            document.getElementById('current-month-display').innerText = `${monthNames[month-1]} ${year}`;

            const currentMonthLetters = [];
            const previousLetters = [];
            
            letters.forEach(l => {
                const lYear = l.parsedDate.getFullYear();
                const lMonth = l.parsedDate.getMonth() + 1;
                
                if (lYear < year || (lYear === year && lMonth < month)) {
                    previousLetters.push(l);
                } else if (lYear === year && lMonth === month) {
                    currentMonthLetters.push(l);
                }
            });

            // Clear existing
            timelineArcs.forEach(layer => {
                if (layer.isAnimating) layer.isAnimating = false;
                mapTimeline.removeLayer(layer);
            });
            timelineArcs.length = 0;

            // Draw previous (faded)
            drawTimelineArcs(mapTimeline, previousLetters, timelineArcs, true);
            
            // Draw current (highlighted)
            drawTimelineArcs(mapTimeline, currentMonthLetters, timelineArcs, false);

            // Animate current month letters
            if (monthIndex !== lastMonthIndex) {
                const feedContainer = document.getElementById('timeline-feed-content');
                if (feedContainer && currentMonthLetters.length > 0) {
                    // Dim previous items
                    const previousItems = feedContainer.querySelectorAll('.feed-item');
                    previousItems.forEach(item => {
                        item.classList.add('opacity-50', 'scale-95');
                        item.classList.remove('border-primary', 'shadow-md');
                    });
                    
                    // Add month header
                    if (feedContainer.querySelector('.italic')) feedContainer.innerHTML = '';
                    const header = document.createElement('div');
                    header.className = 'sticky top-0 bg-[#fcfbf8]/95 backdrop-blur py-1 z-10 text-center border-b border-[#e7e1cf] mb-2';
                    header.innerHTML = `<span class="text-[10px] font-bold tracking-widest uppercase text-primary">${monthNames[month-1]} ${year}</span>`;
                    feedContainer.appendChild(header);
                }

                currentMonthLetters.forEach(l => animateLetter(l, mapTimeline, currentMonthLetters.length));
            }
            lastMonthIndex = monthIndex;
            
            // Update Summary Overlay
            const summaryOverlay = document.getElementById('timeline-summary-overlay');
            const summaryContent = document.getElementById('timeline-summary-content');
            if (currentMonthLetters.length > 0) {
                if (currentMonthLetters.length === 1) {
                    const l = currentMonthLetters[0];
                    const asunto = l.asunto || l.temas || "Correspondencia";
                    summaryContent.innerHTML = `
                        <p class="text-[10px] font-bold text-text-muted uppercase mb-1">${l.fecha}</p>
                        <p class="font-serif font-bold text-primary text-base leading-tight mb-1">${asunto}</p>
                        <p class="text-xs text-secondary">${l.remitente} &rarr; ${l.destinatario}</p>
                    `;
                } else {
                    summaryContent.innerHTML = `
                        <p class="text-[10px] font-bold text-text-muted uppercase mb-1">${monthNames[month-1]} ${year}</p>
                        <p class="font-serif font-bold text-primary text-base leading-tight mb-1">Múltiples correspondencias (${currentMonthLetters.length} cartas)</p>
                        <p class="text-xs text-secondary">Actividad simultánea en varias rutas.</p>
                    `;
                }
                summaryOverlay.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                summaryOverlay.classList.add('opacity-0', 'pointer-events-none');
            }

            // Fly to bounds smoothly
            let bounds = L.latLngBounds();
            if (currentMonthLetters.length > 0) {
                currentMonthLetters.forEach(l => {
                    if(l.origen) bounds.extend([l.origen.lat, l.origen.lng]);
                    if(l.destino) bounds.extend([l.destino.lat, l.destino.lng]);
                });
            } else if (previousLetters.length > 0) {
                previousLetters.forEach(l => {
                    if(l.origen) bounds.extend([l.origen.lat, l.origen.lng]);
                    if(l.destino) bounds.extend([l.destino.lat, l.destino.lng]);
                });
            }
            
            if (bounds.isValid()) {
                mapTimeline.flyToBounds(bounds, { padding: [80, 80], duration: 1.5, maxZoom: 6, easeLinearity: 0.25 });
            }
        }

        let timelineTimeout = null;
        let progressInterval = null;

        function togglePlay() {
            const btn = document.getElementById('play-btn-icon');
            const progressBar = document.getElementById('playback-progress-bar');
            
            if (timelineTimeout) {
                clearTimeout(timelineTimeout);
                clearInterval(progressInterval);
                timelineTimeout = null;
                progressInterval = null;
                btn.innerText = 'play_arrow';
                btn.classList.add('ml-1');
                if (progressBar) {
                    progressBar.style.transition = 'none';
                    progressBar.style.width = '0%';
                }
            } else {
                btn.innerText = 'pause';
                btn.classList.remove('ml-1');
                playNextEvent();
            }
        }

        function getMonthsWithLetters() {
            const monthsWithLetters = new Set();
            letters.forEach(l => {
                if (!l.parsedDate) return;
                const year = l.parsedDate.getFullYear();
                const month = l.parsedDate.getMonth();
                const monthIndex = (year - 1668) * 12 + month;
                if (monthIndex >= 0 && monthIndex <= 23) {
                    monthsWithLetters.add(monthIndex);
                }
            });
            return Array.from(monthsWithLetters).sort((a, b) => a - b);
        }

        function jumpToNextEvent() {
            const slider = document.getElementById('timeline-slider');
            let currentVal = parseInt(slider.value);
            const months = getMonthsWithLetters();
            
            if (months.length === 0) return;
            
            let nextVal = months.find(m => m > currentVal);
            if (nextVal === undefined) nextVal = months[0]; // Loop back to start
            
            slider.value = nextVal;
            updateTimeline(nextVal);
        }

        function jumpToPrevEvent() {
            const slider = document.getElementById('timeline-slider');
            let currentVal = parseInt(slider.value);
            const months = getMonthsWithLetters();
            
            if (months.length === 0) return;
            
            let prevVal = [...months].reverse().find(m => m < currentVal);
            if (prevVal === undefined) prevVal = months[months.length - 1]; // Loop to end
            
            slider.value = prevVal;
            updateTimeline(prevVal);
        }

        function playNextEvent() {
            const btn = document.getElementById('play-btn-icon');
            if (btn.innerText !== 'pause') return;
            
            let slider = document.getElementById('timeline-slider');
            let currentVal = parseInt(slider.value);
            const months = getMonthsWithLetters();
            
            // If no letters at all, just stop
            if (months.length === 0) {
                togglePlay();
                return;
            }
            
            let nextVal = months.find(m => m > currentVal);
            if (nextVal === undefined) nextVal = months[0];
            
            slider.value = nextVal;
            updateTimeline(nextVal);
            
            const speedSelector = document.getElementById('playback-speed');
            const delay = speedSelector ? parseInt(speedSelector.value) : 1500;
            const totalWait = delay + 2500; // 2.5s animation + delay
            
            // Progress Bar Animation
            const progressBar = document.getElementById('playback-progress-bar');
            if (progressBar) {
                progressBar.style.transition = 'none';
                progressBar.style.width = '0%';
                
                // Force reflow
                void progressBar.offsetWidth;
                
                progressBar.style.transition = `width ${totalWait}ms linear`;
                progressBar.style.width = '100%';
            }
            
            timelineTimeout = setTimeout(playNextEvent, totalWait);
        }

        function animateLetter(letter, mapInstance, concurrentCount = 1) {
            if (!letter.origen || !letter.destino) return;
            const p1 = [letter.origen.lat, letter.origen.lng];
            const p2 = [letter.destino.lat, letter.destino.lng];
            const curvePoints = getCurvePoints(p1, p2);
            
            // Add to feed
            const feedContainer = document.getElementById('timeline-feed-content');
            if (feedContainer) {
                const feedItem = document.createElement('div');
                feedItem.className = 'feed-item bg-white border-2 border-primary p-3 rounded-xl shadow-md cursor-pointer hover:bg-[#fcfbf8] transition-all transform origin-top';
                feedItem.onclick = () => {
                    const lYear = letter.parsedDate.getFullYear();
                    const lMonth = letter.parsedDate.getMonth();
                    const mIndex = (lYear - 1668) * 12 + lMonth;
                    document.getElementById('timeline-slider').value = mIndex;
                    updateTimeline(mIndex);
                };
                feedItem.innerHTML = `
                    <p class="text-[10px] font-bold text-text-muted uppercase mb-1">${letter.fecha}</p>
                    <p class="font-serif text-primary leading-tight"><span class="font-bold">${letter.remitente}</span> envía a <span class="font-bold">${letter.destinatario}</span></p>
                    <p class="text-xs text-text-muted mt-2 flex items-center gap-1 bg-[#fcfbf8] p-1.5 rounded border border-[#e7e1cf]">
                        <span class="material-symbols-outlined text-[14px] text-[#c5a028]">route</span>
                        <span class="truncate">${letter.origen.nombre} &rarr; ${letter.destino.nombre}</span>
                    </p>
                `;
                feedContainer.appendChild(feedItem);
                
                // Smooth scroll to bottom
                setTimeout(() => {
                    feedContainer.scrollTo({
                        top: feedContainer.scrollHeight,
                        behavior: 'smooth'
                    });
                }, 50);
            }

            // Conditional Static Labels
            if (concurrentCount <= 2) {
                // Sender Label
                const originIcon = L.divIcon({
                    className: 'static-sender-label',
                    html: `<div class="static-label-content bg-[#fcfbf8] text-[#2d2a26] px-3 py-1.5 rounded-lg shadow-lg border border-[#c5a028] whitespace-nowrap w-max">
                            <span class="text-[9px] uppercase tracking-wider text-text-muted block mb-0.5">Remite desde ${letter.origen.nombre}</span>
                            <span class="font-serif font-bold text-sm text-primary">${letter.remitente}</span>
                           </div>`,
                    iconSize: [0, 0]
                });
                const originLabel = L.marker(p1, { icon: originIcon, zIndexOffset: 2000 }).addTo(mapInstance);
                timelineArcs.push(originLabel);

                // Recipient Label
                const destIcon = L.divIcon({
                    className: 'static-recipient-label',
                    html: `<div class="static-label-content bg-[#fcfbf8] text-[#2d2a26] px-3 py-1.5 rounded-lg shadow-lg border border-[#c5a028] whitespace-nowrap w-max">
                            <span class="text-[9px] uppercase tracking-wider text-text-muted block mb-0.5">Destino: ${letter.destino.nombre}</span>
                            <span class="font-serif font-bold text-sm text-primary">${letter.destinatario}</span>
                           </div>`,
                    iconSize: [0, 0]
                });
                const destLabel = L.marker(p2, { icon: destIcon, zIndexOffset: 2000 }).addTo(mapInstance);
                timelineArcs.push(destLabel);
            }

            // Origin Pulse Marker
            const originIcon = L.divIcon({
                className: 'pulse-marker',
                html: `<div class="w-3 h-3 bg-[#c5a028] rounded-full shadow-[0_0_10px_rgba(197,160,40,0.8)] animate-pulse"></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });
            const originLabel = L.marker(p1, { icon: originIcon }).addTo(mapInstance);
            timelineArcs.push(originLabel);

            // Dest Pulse Marker
            const destIcon = L.divIcon({
                className: 'pulse-marker',
                html: `<div class="w-3 h-3 bg-[#c5a028] rounded-full shadow-[0_0_10px_rgba(197,160,40,0.8)] animate-pulse"></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });
            const destLabel = L.marker(p2, { icon: destIcon }).addTo(mapInstance);
            timelineArcs.push(destLabel);
            
            // Moving Envelope
            const icon = L.divIcon({
                className: 'moving-letter-label',
                html: `<div class="moving-letter-content drop-shadow-md flex items-center justify-center relative">
                        <div class="absolute bg-white" style="width: 18px; height: 12px; border-radius: 2px;"></div>
                        <span class="material-symbols-outlined relative z-10 text-[26px] text-[#c5a028]" style="font-variation-settings: 'FILL' 0;">mail</span>
                       </div>`,
                iconSize: [0, 0]
            });
            
            const marker = L.marker(curvePoints[0], { icon: icon, zIndexOffset: 1000 }).addTo(mapInstance);
            marker.isAnimating = true;
            timelineArcs.push(marker); // Keep track to clear it if needed
            
            let start = null;
            const duration = 3000; // 3 seconds animation
            
            function step(timestamp) {
                if (!marker.isAnimating) return;
                if (!start) start = timestamp;
                const progress = (timestamp - start) / duration;
                
                if (progress < 1) {
                    const index = progress * (curvePoints.length - 1);
                    const i = Math.floor(index);
                    const f = index - i;
                    
                    if (i < curvePoints.length - 1) {
                        const lat = curvePoints[i][0] + (curvePoints[i+1][0] - curvePoints[i][0]) * f;
                        const lng = curvePoints[i][1] + (curvePoints[i+1][1] - curvePoints[i][1]) * f;
                        marker.setLatLng([lat, lng]);
                    }
                    requestAnimationFrame(step);
                } else {
                    marker.setLatLng(curvePoints[curvePoints.length - 1]);
                    setTimeout(() => {
                        if (marker.isAnimating && mapInstance.hasLayer(marker)) {
                            mapInstance.removeLayer(marker);
                        }
                    }, 800);
                }
            }
            requestAnimationFrame(step);
        }

        function drawTimelineArcs(mapInstance, data, arcArray, isFaded) {
            data.forEach(letter => {
                if (!letter.origen || !letter.destino) return;
                const p1 = [letter.origen.lat, letter.origen.lng];
                const p2 = [letter.destino.lat, letter.destino.lng];
                const curvePoints = getCurvePoints(p1, p2);
                
                const line = L.polyline(curvePoints, {
                    color: isFaded ? '#a39b82' : '#c5a028',
                    weight: isFaded ? 1.5 : 3,
                    opacity: isFaded ? 0.3 : 0.8,
                    className: isFaded ? '' : 'arc-path'
                }).addTo(mapInstance);
                arcArray.push(line);

                const originMarker = L.circleMarker(p1, {
                    radius: isFaded ? 4 : 6, 
                    fillColor: isFaded ? '#a39b82' : '#2d2a26', 
                    color: '#fff', weight: 1, fillOpacity: isFaded ? 0.5 : 1
                }).bindTooltip("Origen: " + (letter.origen.nombre || "Desconocido")).addTo(mapInstance);
                arcArray.push(originMarker);

                const destMarker = L.circleMarker(p2, {
                    radius: isFaded ? 4 : 7, 
                    fillColor: isFaded ? '#eaddcf' : '#c5a028', 
                    color: isFaded ? '#a39b82' : '#2d2a26', 
                    weight: 2, fillOpacity: isFaded ? 0.6 : 1
                }).bindTooltip("Destino: " + (letter.destino.nombre || "Desconocido")).addTo(mapInstance);
                arcArray.push(destMarker);
            });
        }

        let lastMonthIndex = -1;

        function openReader(letter) {
            currentLetter = letter;
            const reader = document.getElementById('view-reader');
            reader.classList.remove('hidden');
            reader.classList.add('flex');
            
            document.getElementById('reader-title').innerText = letter.nombre_carta || `De ${letter.remitente} a ${letter.destinatario}`;
            document.getElementById('reader-date').innerHTML = `<span class="material-symbols-outlined text-[16px]">calendar_today</span> ${letter.fecha}`;
            document.getElementById('reader-route').innerHTML = `<span class="material-symbols-outlined text-[16px]">route</span> ${(letter.origen && letter.origen.nombre) || 'Desconocido'} &rarr; ${(letter.destino && letter.destino.nombre) || 'Desconocido'}`;
            
            currentZoom = 1;
            const imgEl = document.getElementById('manuscript-img');
            imgEl.style.transform = `scale(${currentZoom})`;
            
            // Set image from map or fallback
            let imgSrc = "https://images.unsplash.com/photo-1577083552431-6e5fd01aa342?q=80&w=1000&auto=format&fit=crop";
            if (letter.imagenes && letter.imagenes.length > 0) {
                const imgPath = letter.imagenes[0];
                const imgName = imgPath.split('/').pop();
                if (imageMap[imgName]) {
                    imgSrc = imageMap[imgName];
                } else if (imageMap[imgPath]) {
                    imgSrc = imageMap[imgPath];
                }
            }
            imgEl.src = imgSrc;
            
            toggleTranscription('modern');
        }

        function closeReader() {
            const reader = document.getElementById('view-reader');
            reader.classList.add('hidden');
            reader.classList.remove('flex');
            currentLetter = null;
        }

        function toggleTranscription(type) {
            if(!currentLetter) return;
            currentTranscription = type;
            
            const btnLiteral = document.getElementById('btn-literal');
            const btnModern = document.getElementById('btn-modern');
            
            const formatText = (text, isModern) => {
                if (!text) return "";
                
                let formattedText = text;
                
                // If there are no newlines, try to add them intelligently based on 17th-century Spanish letter patterns
                if (!formattedText.includes('\n')) {
                    if (!isModern) {
                        // Literal text: split by "1. ", "2. ", etc.
                        formattedText = formattedText.replace(/(\b\d+\.\s)/g, '\n$1');
                    } else {
                        // Modern text: auto-paragraphing
                        let t = formattedText;
                        // Greeting
                        t = t.replace(/^(Amigo y señor mío,|Muy señor mío,|Señor mío,|Excelentísimo Señor,)\s*/i, '$1\n\n');
                        
                        // Sign-offs and common endings
                        t = t.replace(/(Besa las manos|Guarde Dios|cuya vida guarde|Dios guarde|Quedo a la obediencia|Su más seguro servidor|Perdóneme v\. m\.)/gi, '\n\n$1');
                        
                        // Dates/Locations at the end
                        t = t.replace(/(\. )([A-Z][a-z]+ y [a-z]+, a \d+ de \d{4}|\bMadrid, \d+|\bValencia, \d+|\bZaragoza, \d+)/g, '$1\n\n$2');
                        
                        let paragraphs = t.split(/\n\n+/);
                        let newParagraphs = [];
                        for (let p of paragraphs) {
                            if (p.length > 250) {
                                let sentences = p.split(/\.\s+(?=[A-Z])/);
                                let currentPara = "";
                                for (let i = 0; i < sentences.length; i++) {
                                    currentPara += sentences[i] + (i < sentences.length - 1 ? ". " : "");
                                    if (currentPara.length > 200 && i < sentences.length - 1) {
                                        newParagraphs.push(currentPara.trim());
                                        currentPara = "";
                                    }
                                }
                                if (currentPara.trim().length > 0) {
                                    newParagraphs.push(currentPara.trim());
                                }
                            } else {
                                newParagraphs.push(p.trim());
                            }
                        }
                        formattedText = newParagraphs.join('\n\n');
                    }
                }

                const paragraphs = formattedText.split(/\n+/).filter(p => p.trim() !== '');
                if (paragraphs.length === 0) return "";
                
                return paragraphs.map((p, i) => {
                    if (isModern && i === 0 && !p.match(/^(Amigo y señor mío,|Muy señor mío,|Señor mío,|Excelentísimo Señor,)$/i)) {
                        return `<p class="mb-4 first-letter:text-5xl first-letter:font-bold first-letter:text-primary first-letter:float-left first-letter:mr-3 first-letter:mt-[-6px] leading-relaxed">${p}</p>`;
                    }
                    if (!isModern) {
                        // For literal, format the line number
                        let lineFormatted = p.replace(/^(\d+\.)\s/, '<span class="text-text-muted text-xs mr-2 w-4 inline-block text-right font-mono">$1</span> ');
                        return `<p class="mb-1 leading-relaxed pl-6 -ml-6">${lineFormatted}</p>`;
                    }
                    return `<p class="mb-4 leading-relaxed">${p}</p>`;
                }).join('');
            };
            
            if(type === 'literal') {
                btnLiteral.className = "px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-primary";
                btnModern.className = "px-3 py-1 text-sm font-medium rounded text-text-muted hover:text-primary";
                document.getElementById('reader-content').innerHTML = formatText(currentLetter.texto_literal, false);
            } else {
                btnModern.className = "px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-primary";
                btnLiteral.className = "px-3 py-1 text-sm font-medium rounded text-text-muted hover:text-primary";
                document.getElementById('reader-content').innerHTML = formatText(currentLetter.texto_modernizado, true);
            }
        }

        function zoomManuscript(delta) {
            currentZoom += delta;
            if(currentZoom < 0.5) currentZoom = 0.5;
            if(currentZoom > 3) currentZoom = 3;
            document.getElementById('manuscript-img').style.transform = `scale(${currentZoom})`;
        }
    </script>
